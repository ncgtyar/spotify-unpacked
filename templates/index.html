<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unpacked</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #121212;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .nav-menu {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .nav-menu a { text-decoration: none; font-size: 1.1rem; color: #bbb; font-weight: 500; }
        .nav-active { color: #1DB954 !important; font-weight: 700 !important; font-size: 1.45rem !important; }
        .card {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 450px;
        }
        h1 { font-weight: 800; font-size: 3rem; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.5; font-size: 1.2rem; }
        .btn {
            background-color: #1DB954;
            color: white;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover { background-color: #1ed760; transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="nav-menu">
        <a href="#" class="nav-active">Home</a>
        <a href="/login">My Stats</a>
    </nav>
    <div class="card">
        <h1>Unpacked</h1>
        <p>Discover your most played artists, albums, and tracks now!</p>
        <a href="/login" class="btn">Log in with Spotify</a>
    </div>
</body>
</html>
